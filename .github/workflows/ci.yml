name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # libgit2 (Cargo's default) ignores `git config insteadOf`. Force git CLI
  # so the PAT-rewrite below applies when fetching the private adaptive-
  # card-core dep.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        # Don't leave the runner repo's GITHUB_TOKEN as a global git
        # extraheader — it conflicts with the AC_CORE_PAT we configure
        # below for the private adaptive-card-core dep clone.
        with:
          persist-credentials: false
      # Cargo's git dep on greentic-biz/greentic-adaptive-card-mcp (private)
      # needs auth. Org policy disables deploy keys, so we use a fine-grained
      # PAT with `Contents: Read` scope on that repo, stored as the
      # AC_CORE_PAT secret. The git insteadOf rewrite makes Cargo's HTTPS
      # clone use the token transparently.
      - name: Configure git auth for private cargo dep
        run: |
          if [ -z "${AC_CORE_PAT}" ]; then
            echo "::error::AC_CORE_PAT secret is empty. See README 'CI auth setup'."
            exit 1
          fi
          echo "AC_CORE_PAT present (length=${#AC_CORE_PAT})"
          git config --global \
            url."https://x-access-token:${AC_CORE_PAT}@github.com/greentic-biz/greentic-adaptive-card-mcp".insteadOf \
            "ssh://git@github.com/greentic-biz/greentic-adaptive-card-mcp"
          echo "Probing token access (masked):"
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            -H "Authorization: token ${AC_CORE_PAT}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/greentic-biz/greentic-adaptive-card-mcp \
            || echo "(probe failed)"
        env:
          AC_CORE_PAT: ${{ secrets.AC_CORE_PAT }}
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1,wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      # Single source of truth for local + CI. Scopes fmt/clippy/test/build
      # to host-side crates (excludes the wasm32 cdylib).
      - run: bash ci/local_check.sh
