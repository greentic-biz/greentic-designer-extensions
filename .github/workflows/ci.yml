name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # Cargo's git dep on greentic-biz/greentic-adaptive-card-mcp (private)
      # requires SSH access. Add a deploy key on that repo (read-only) and
      # paste its private half into AC_CORE_DEPLOY_KEY secret on this repo.
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AC_CORE_DEPLOY_KEY }}
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1,wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      # Single source of truth for local + CI. Scopes fmt/clippy/test/build
      # to host-side crates (excludes the wasm32 cdylib).
      - run: bash ci/local_check.sh
